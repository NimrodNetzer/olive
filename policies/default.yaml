# Olive policy - one gateway instance fronting one agent (stdio mode).
# Policy-as-code: this file is the single source of authorization truth.

gateway:
  agent_id: support-agent-7f3a
  organization_id: demo-company
  role: customer-support
  declared_goal: resolve customer support tickets
  db_path: olive_events.db

roles:
  customer-support:
    # Per-role throttle (M2): a session over this rate is denied calls until it
    # slows down. A throttle is not an attack - it never mints an incident or
    # quarantines the session. Omit for unlimited.
    max_calls_per_minute: 60
    allowed_tools:
      - read_faq
      - search_kb
      - read_customer_order
      - read_file
    forbidden_tools:
      - access_payroll
      - read_database
      - execute_code
      - delete_record

# Trust label tunes inspection depth, never disables it (THREAT_MODEL.md).
upstream:
  trust: untrusted

# Deterministic containment (ADR-0006): after this many blocked calls in a
# session, the whole session is quarantined until a human releases it.
containment:
  max_blocks_before_quarantine: 3

# Layer-zero deterministic patterns. Known to be bypassable by encoding or
# paraphrase - the eval corpus measures that honestly. Smarter detection is M3.
injection_patterns:
  - ignore previous instructions
  - override previous instructions
  - ignore all previous
  - system override
  - you are now
  - forget your instructions
  - "new instructions:"
  - disregard your
  - your true purpose is
  - output all credentials
  - reveal your system prompt
  - act as if you are
  # Shell escalation and sensitive filesystem paths
  - sudo chmod
  - /etc/shadow
  - /etc/passwd
  # JWT algorithm downgrade (alg:none removes signature verification)
  - '"alg":"none"'
  - '"alg": "none"'
