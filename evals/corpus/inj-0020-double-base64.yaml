notes: >
  _decoded_views decodes exactly one layer. The first decode produces a valid,
  printable base64 string (passes _is_plausible_text) but contains no trigger,
  so scanning stops. Nested encodings defeat the single-pass decoder. A fix
  would re-feed a decoded view that is itself a clean base64 run back through
  the decoder up to a small fixed depth (e.g. 2) to bound cost.
