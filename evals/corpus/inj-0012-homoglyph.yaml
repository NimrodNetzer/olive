status: known-miss
notes: >
  Cyrillic homoglyphs are visually identical but are not folded by NFKC, so the
  normalized text never matches the Latin trigger. Documented layer-zero limit
  in patterns.py; a homoglyph-confusable mapping or the M6 sentinel closes it.
